<div class="page-container">
  <div class="page-header">
    <h1>Períodos de Evaluación</h1>
    <button class="btn btn-primary" (click)="abrirModal()">+ Nuevo Período</button>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Fecha Inicio</th>
        <th>Fecha Fin</th>
        <th>Activo</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of periodos">
        <td>{{ p.nombre }}</td>
        <td>{{ p.fecha_inicio }}</td>
        <td>{{ p.fecha_fin }}</td>
        <td>
          <span class="badge" [class.badge-success]="p.activo" [class.badge-danger]="!p.activo">
            {{ p.activo ? 'Sí' : 'No' }}
          </span>
        </td>
        <td class="actions">
          <button class="btn btn-sm btn-edit" (click)="abrirModal(p)">Editar</button>
          <button class="btn btn-sm btn-delete" (click)="eliminar(p.id!)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div class="modal-overlay" *ngIf="showModal" (click)="showModal = false">
  <div class="modal" (click)="$event.stopPropagation()">
    <h2>{{ editMode ? 'Editar' : 'Nuevo' }} Período</h2>
    <div class="modal-body">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" class="form-control" [(ngModel)]="form.nombre" required>
      </div>
      <div class="form-group">
        <label>Fecha Inicio</label>
        <input type="date" class="form-control" [(ngModel)]="form.fecha_inicio" required>
      </div>
      <div class="form-group">
        <label>Fecha Fin</label>
        <input type="date" class="form-control" [(ngModel)]="form.fecha_fin" required>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="form.activo"> Activo
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="showModal = false">Cancelar</button>
      <button class="btn btn-primary" (click)="guardar()">Guardar</button>
    </div>
  </div>
</div>

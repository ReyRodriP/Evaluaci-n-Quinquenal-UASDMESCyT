<div class="crud-container">
    <div class="crud-header">
        <app-search-bar [titulo]="'Períodos'" [placeholder]="'Buscar por nombre'" [stateOptions]="['Todas', 'Activos', 'Inactivos']" (create)="openNew()" (search)="onSearch($event)" (stateChange)="onStateChange($event)"></app-search-bar>
    <app-crud-table [columnas]="columnas" [datos]="datosFiltrados" (edit)="openEdit($event)" (remove)="onRemove($event)" (toggleEstado)="onToggleEstado($event)"></app-crud-table>
    <app-pagination></app-pagination>

    <app-modal
      [open]="showModal"
      [data]="selectedItem"
      [title]="'Período'"
      [newTitle]="'Nuevo Período'"
      [editTitle]="'Editar Período'"
      [fields]="periodoFields"
      (close)="onModalClose()"
      (save)="onModalSave($event)"></app-modal>
</div>
</div>

<div class="crud-container">
    <div class="crud-header">
        <app-search-bar [titulo]="'Períodos'" (create)="openNew()"></app-search-bar>
    <app-crud-table [columnas]="columnas" [datos]="datos" (edit)="openEdit($event)" (remove)="onRemove($event)" (toggleEstado)="onToggleEstado($event)"></app-crud-table>
    <app-pagination></app-pagination>

    <app-modal
      [open]="showModal"
      [data]="selectedItem"
      [title]="'Período'"
      [newTitle]="'Nuevo Período'"
      [editTitle]="'Editar Período'"
      [fields]="periodoFields"
      (close)="onModalClose()"
      (save)="onModalSave($event)"></app-modal>
</div>
</div>

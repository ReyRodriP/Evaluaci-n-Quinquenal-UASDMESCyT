<div class="page-container">
  <div class="page-header">
    <h1>Criterios de Evaluación</h1>
    <button class="btn btn-primary" (click)="abrirModal()">+ Nuevo Criterio</button>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Período</th>
        <th>Activo</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of criterios">
        <td>{{ c.nombre }}</td>
        <td>{{ c.descripcion }}</td>
        <td>{{ c.periodo_nombre }}</td>
        <td>
          <span class="badge" [class.badge-success]="c.activo" [class.badge-danger]="!c.activo">
            {{ c.activo ? 'Sí' : 'No' }}
          </span>
        </td>
        <td class="actions">
          <button class="btn btn-sm btn-edit" (click)="abrirModal(c)">Editar</button>
          <button class="btn btn-sm btn-delete" (click)="eliminar(c.id!)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div class="modal-overlay" *ngIf="showModal" (click)="showModal = false">
  <div class="modal" (click)="$event.stopPropagation()">
    <h2>{{ editMode ? 'Editar' : 'Nuevo' }} Criterio</h2>
    <div class="modal-body">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" class="form-control" [(ngModel)]="form.nombre" required>
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea class="form-control" [(ngModel)]="form.descripcion"></textarea>
      </div>
      <div class="form-group">
        <label>Período</label>
        <select class="form-control" [(ngModel)]="form.periodo">
          <option *ngFor="let p of periodos" [value]="p.id">{{ p.nombre }}</option>
        </select>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="form.activo"> Activo
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="showModal = false">Cancelar</button>
      <button class="btn btn-primary" (click)="guardar()">Guardar</button>
    </div>
  </div>
</div>

<div class="crud-container">
  <div class="crud-header">
    <app-search-bar [titulo]="'Criterios'" [placeholder]="'Buscar por nombre'" [stateOptions]="['Todas', 'Activos', 'Inactivos']" [showCreate]="puedeCrear" (create)="openNew()" (search)="onSearch($event)" (stateChange)="onStateChange($event)"></app-search-bar>
    <app-crud-table [columnas]="columnas" [datos]="datosFiltrados" [ocultarAcciones]="ocultarAcciones" (edit)="openEdit($event)" (remove)="onRemove($event)" (toggleEstado)="onToggleEstado($event)"></app-crud-table>
    <app-pagination></app-pagination>

    <app-modal
      [open]="showModal"
      [data]="selectedItem"
      [title]="'Criterio'"
      [newTitle]="'Nuevo Criterio'"
      [editTitle]="'Editar Criterio'"
      [fields]="criterioFields"
      (close)="onModalClose()"
      (save)="onModalSave($event)">
    </app-modal>
  </div>
</div>

<div class="page-container">
  <div class="page-header">
    <h1>Gestión de Usuarios</h1>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Nombre</th>
        <th>Email</th>
        <th>Teléfono</th>
        <th>Rol</th>
        <th>Activo</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let u of usuarios">
        <td>{{ u.username }}</td>
        <td>{{ u.first_name }} {{ u.last_name }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.telefono }}</td>
        <td>{{ u.rol }}</td>
        <td>
          <span class="badge" [class.badge-success]="u.is_active" [class.badge-danger]="!u.is_active">
            {{ u.is_active ? 'Sí' : 'No' }}
          </span>
        </td>
        <td class="actions">
          <button class="btn btn-sm btn-edit" (click)="abrirModal(u)">Editar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div class="modal-overlay" *ngIf="showModal" (click)="showModal = false">
  <div class="modal" (click)="$event.stopPropagation()">
    <h2>{{ editMode ? 'Editar' : 'Nuevo' }} Usuario</h2>
    <div class="modal-body">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" class="form-control" [(ngModel)]="form.username" [disabled]="editMode">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" [(ngModel)]="form.email">
      </div>
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" class="form-control" [(ngModel)]="form.first_name">
      </div>
      <div class="form-group">
        <label>Apellido</label>
        <input type="text" class="form-control" [(ngModel)]="form.last_name">
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" class="form-control" [(ngModel)]="form.telefono">
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="form.is_active"> Activo
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="showModal = false">Cancelar</button>
      <button class="btn btn-primary" (click)="guardar()">Guardar</button>
    </div>
  </div>
</div>

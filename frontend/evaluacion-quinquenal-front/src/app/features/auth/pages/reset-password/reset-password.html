<div class="auth-card">
  <h1>Nueva contraseña</h1>
  <p class="subtitle">Define una nueva contraseña para tu cuenta.</p>

  <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
    <div class="input-group">
      <i class='bx bx-lock-alt'></i>
      <input type="password" placeholder="Nueva contraseña" formControlName="new_password" />
    </div>

    <div class="input-group">
      <i class='bx bx-lock-alt'></i>
      <input type="password" placeholder="Confirmar contraseña" formControlName="confirm_password" />
    </div>

    <button type="submit" class="btn-submit">Restablecer contraseña</button>
  </form>

  <div class="links">
    <a routerLink="/auth/login">Volver al inicio de sesión</a>
  </div>
</div>

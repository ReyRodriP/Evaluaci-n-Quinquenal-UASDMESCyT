<div class="auth-card">
  <h1>Recuperar contraseña</h1>
  <p class="subtitle">Ingresa tu correo electrónico para recibir instrucciones de recuperación.</p>

  <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
    <div class="input-group">
      <i class='bx bx-envelope'></i>
      <input type="email" placeholder="Correo electrónico" formControlName="email" />
    </div>

    <button type="submit" class="btn-submit">Enviar instrucciones</button>
  </form>

  <div class="links">
    <a routerLink="/auth/login">Volver al inicio de sesión</a>
  </div>
</div>

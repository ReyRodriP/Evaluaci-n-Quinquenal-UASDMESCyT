
<div class="login-container">

    <img src="img/UASD-Logo.png" alt="Logo UASD" class="login-logo">

    <h1>Inicio de Sesión</h1>

    <p class="subtitle">
        Accede a tu seguimiento académico
    </p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <div class="input-group">
            <i class='bx bx-user'></i>
            <input type="text" placeholder="Nombre de usuario" formControlName="username">
        </div>

        <div class="input-group">
            <i class="bx bx-lock"></i>
            <input [type]="showPassword ? 'text' : 'password'" placeholder="Contraseña" formControlName="password" required minlength="6">
            <button type="button" class="password-toggle" (click)="togglePasswordVisibility()" aria-label="Mostrar u ocultar contraseña">
                <i class="bx" [ngClass]="showPassword ? 'bx bx-eye' : 'bx bx-eye-closed'"></i>
            </button>
        </div>

        <button type="submit" class="btn-login">
            Ingresar
        </button>

    </form>

    <div class="register-link">
        <a routerLink="/auth/forgot-password">¿Olvidaste tu contraseña?</a>
    </div>

    <div class="register-link">
        <p>¿No estás registrado?</p>

        <a routerLink="/auth/register"> <!--Pendiente de arreglo-->
            Registrarse
        </a>
    </div>

</div>

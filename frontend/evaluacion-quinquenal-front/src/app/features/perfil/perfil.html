<div class="profile-container">
  <div class="profile-header">
    <h2>Mi Perfil</h2>
    <p>Administra la información de tu cuenta.</p>
  </div>

  <div class="profile-card">
    <div class="profile-photo">
      <img [src]="getPhotoUrl()" alt="Foto de perfil">

      <label class="change-photo" for="photoInput">
        <i class="bx bx-camera"></i>
        Cambiar foto
      </label>
      <input id="photoInput" type="file" accept="image/*" hidden (change)="onPhotoSelected($event)" />
    </div>

    <div class="profile-form">
      <section>
        <h3>Información de la cuenta</h3>

        <div class="form-group">
          <label>Nombre de usuario</label>
          <input type="text" [(ngModel)]="user.username" name="username" placeholder="Nombre de usuario">
        </div>

        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" [(ngModel)]="user.email" name="email" placeholder="correo@uasd.edu.do">
        </div>

        <div class="password-row">
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" value="************" disabled>
          </div>

          <button class="btn-change-password" type="button" (click)="togglePasswordFields()">
            {{ showPasswordFields ? 'Cancelar' : 'Cambiar' }}
          </button>
        </div>

        <div *ngIf="showPasswordFields" class="password-fields">
          <div class="form-group">
            <label>Contraseña actual</label>
            <input type="password" [(ngModel)]="passwordPayload.old_password" name="old_password" placeholder="Contraseña actual">
          </div>

          <div class="form-group">
            <label>Nueva contraseña</label>
            <input type="password" [(ngModel)]="passwordPayload.new_password" name="new_password" placeholder="Nueva contraseña">
          </div>

          <button class="btn-save btn-password" type="button" (click)="changePassword()">
            Guardar contraseña
          </button>
        </div>
      </section>

      <section>
        <h3>Información personal</h3>

        <div class="grid-2">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" [(ngModel)]="user.first_name" name="first_name" placeholder="Nombre">
          </div>

          <div class="form-group">
            <label>Apellido</label>
            <input type="text" [(ngModel)]="user.last_name" name="last_name" placeholder="Apellido">
          </div>
        </div>

        <div class="form-group">
          <label>Número telefónico</label>
          <input type="tel" [(ngModel)]="user.telefono" name="telefono" placeholder="(809) 000-0000">
        </div>
      </section>

      <div class="profile-actions">
        <button class="btn-cancel" type="button" (click)="goBack()">Volver</button>
        <button class="btn-save" type="button" (click)="onSubmit()" [disabled]="loading">
          {{ loading ? 'Guardando...' : 'Guardar cambios' }}
        </button>
      </div>
    </div>
  </div>
</div>

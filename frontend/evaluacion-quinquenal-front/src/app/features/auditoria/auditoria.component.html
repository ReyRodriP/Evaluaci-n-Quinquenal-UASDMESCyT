<div class="page-container">
  <div class="page-header">
    <h1>Bitácora de Auditoría</h1>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Usuario</th>
        <th>Acción</th>
        <th>Modelo</th>
        <th>Descripción</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let e of entries">
        <td>{{ e.fecha | date:'dd/MM/yyyy HH:mm' }}</td>
        <td>{{ e.usuario_nombre || 'Sistema' }}</td>
        <td>{{ e.accion }}</td>
        <td>{{ e.modelo }}</td>
        <td>{{ e.descripcion }}</td>
      </tr>
      <tr *ngIf="entries.length === 0">
        <td colspan="5" class="text-center">No hay registros de auditoría</td>
      </tr>
    </tbody>
  </table>
</div>

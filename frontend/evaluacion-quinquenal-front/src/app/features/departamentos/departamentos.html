<div class="crud-container">
    <div class="crud-header">
        <app-search-bar [titulo]="'Departamentos'" [placeholder]="'Buscar por nombre'" [stateOptions]="['Todas', 'Activas', 'Inactivas']" [showCreate]="puedeCrear" (create)="openNew()" (search)="onSearch($event)" (stateChange)="onStateChange($event)"></app-search-bar>
    <app-crud-table [columnas]="columnas" [datos]="datosFiltrados" [ocultarAcciones]="ocultarAcciones" (edit)="openEdit($event)" (remove)="onRemove($event)" (toggleEstado)="onToggleEstado($event)"></app-crud-table>
    <app-pagination></app-pagination>

    <app-modal
      [open]="showModal"
      [data]="selectedItem"
      [title]="'Departamento'"
      [newTitle]="'Nuevo Departamento'"
      [editTitle]="'Editar Departamento'"
      [fields]="departamentoFields"
      (close)="onModalClose()"
      (save)="onModalSave($event)"></app-modal>
</div>
</div>

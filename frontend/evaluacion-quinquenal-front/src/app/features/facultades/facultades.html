<div class="crud-container">
    <div class="crud-header">
        <app-search-bar [titulo]="'Facultades'" (create)="openNew()"></app-search-bar>
    <app-crud-table [columnas]="columnas" [datos]="datos" (edit)="openEdit($event)"></app-crud-table>
    <app-pagination></app-pagination>

    <app-modal [open]="showModal" [data]="selectedItem" (close)="onModalClose()" (save)="onModalSave($event)"></app-modal>
</div>

<div class="crud-container">
    <div class="crud-header">
        <app-search-bar [titulo]="'Facultades'" [placeholder]="'Buscar por nombre'" [stateOptions]="['Todas', 'Activas', 'Inactivas']" (create)="openNew()" (search)="onSearch($event)" (stateChange)="onStateChange($event)"></app-search-bar>
    <app-crud-table [columnas]="columnas" [datos]="datosFiltrados" (edit)="openEdit($event)" (remove)="onRemove($event)" (toggleEstado)="onToggleEstado($event)"></app-crud-table>
    <app-pagination></app-pagination>

    <app-modal
      [open]="showModal"
      [data]="selectedItem"
      [title]="'Facultad'"
      [newTitle]="'Nueva Facultad'"
      [editTitle]="'Editar Facultad'"
      [fields]="facultadFields"
      (close)="onModalClose()"
      (save)="onModalSave($event)"></app-modal>
</div>
</div>

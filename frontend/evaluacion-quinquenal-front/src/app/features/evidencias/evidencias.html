<section class="evidencias-page">
  <div *ngIf="loading" class="state-message">Cargando asignaciones...</div>

  <ng-container *ngIf="!loading">
    <app-search-bar
      [titulo]="'Evidencias'"
      [placeholder]="'Buscar por indicador, departamento, estado...'"
      [stateOptions]="[]"
      [showCreate]="false"
      [showState]="false"
      (search)="onSearch($event)">
    </app-search-bar>

    <app-crud-table
      [columnas]="['Departamento', 'Indicador', 'Período', 'Estado', 'Archivo', 'Observaciones']"
      [datos]="rowsFiltrados"
      [ocultarAcciones]="['edit', 'toggle', 'remove']">
      <ng-template #acciones let-row>
        <div class="action-group">
          <button *ngIf="!row.evidenciaId && puedeSubir" type="button" class="action-btn" (click)="openManage(row)">
            Subir evidencia
          </button>
          <button *ngIf="row.evidenciaId" type="button" class="action-btn" (click)="openManage(row)">
            Ver detalle
          </button>
          <button *ngIf="row.evidenciaId" type="button" class="action-btn secondary" (click)="descargarUltimoArchivo(row)">
            Descargar
          </button>
          <button *ngIf="row.evidenciaId" type="button" class="action-btn secondary" (click)="verHistorial(row)">
            Ver historial
          </button>
          <button *ngIf="row.evidenciaId && row.evidencia?.estado !== 'cancelada' && puedeCancelarReactivar" type="button" class="action-btn danger" (click)="cancelar(row)">
            Cancelar
          </button>
          <button *ngIf="row.evidenciaId && row.evidencia?.estado === 'cancelada' && puedeCancelarReactivar" type="button" class="action-btn secondary" (click)="reactivar(row)">
            Reactivar
          </button>
        </div>
      </ng-template>
    </app-crud-table>

    <div *ngIf="!rowsFiltrados.length && !loading" class="state-message">No hay asignaciones disponibles para gestionar evidencias.</div>
  </ng-container>

  <app-modal
    [open]="historialAbierto"
    [data]="historialData"
    [title]="'Historial'"
    [editTitle]="'Historial de versiones'"
    [fields]="historialCampos"
    (close)="cerrarHistorial()"
    (save)="cerrarHistorial()">
  </app-modal>
</section>

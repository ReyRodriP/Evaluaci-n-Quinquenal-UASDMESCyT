<div class="crud-container">
  <div class="crud-header">
    <app-search-bar [titulo]="'Asignaciones'" (create)="openNew()"></app-search-bar>
    <app-crud-table [columnas]="columnas" [datos]="datos" (edit)="openEdit($event)" (remove)="onRemove($event)" (toggleEstado)="onToggleEstado($event)"></app-crud-table>
    <app-pagination></app-pagination>

    <app-modal
      [open]="showModal"
      [data]="selectedItem"
      [title]="'Asignación'"
      [newTitle]="'Nueva Asignación'"
      [editTitle]="'Editar Asignación'"
      [fields]="asignacionFields"
      (close)="onModalClose()"
      (save)="onModalSave($event)">
    </app-modal>
  </div>
</div>

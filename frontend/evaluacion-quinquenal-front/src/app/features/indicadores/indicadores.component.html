<div class="page-container">
  <div class="page-header">
    <h1>Indicadores</h1>
    <button class="btn btn-primary" (click)="abrirModal()">+ Nuevo Indicador</button>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Criterio</th>
        <th>Obligatorio</th>
        <th>Activo</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let i of indicadores">
        <td>{{ i.nombre }}</td>
        <td>{{ i.descripcion }}</td>
        <td>{{ i.criterio_nombre }}</td>
        <td>
          <span class="badge" [class.badge-success]="i.obligatorio" [class.badge-secondary]="!i.obligatorio">
            {{ i.obligatorio ? 'Sí' : 'No' }}
          </span>
        </td>
        <td>
          <span class="badge" [class.badge-success]="i.activo" [class.badge-danger]="!i.activo">
            {{ i.activo ? 'Sí' : 'No' }}
          </span>
        </td>
        <td class="actions">
          <button class="btn btn-sm btn-edit" (click)="abrirModal(i)">Editar</button>
          <button class="btn btn-sm btn-delete" (click)="eliminar(i.id!)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div class="modal-overlay" *ngIf="showModal" (click)="showModal = false">
  <div class="modal" (click)="$event.stopPropagation()">
    <h2>{{ editMode ? 'Editar' : 'Nuevo' }} Indicador</h2>
    <div class="modal-body">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" class="form-control" [(ngModel)]="form.nombre" required>
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea class="form-control" [(ngModel)]="form.descripcion"></textarea>
      </div>
      <div class="form-group">
        <label>Criterio</label>
        <select class="form-control" [(ngModel)]="form.criterio">
          <option *ngFor="let c of criterios" [value]="c.id">{{ c.nombre }}</option>
        </select>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="form.obligatorio"> Obligatorio
        </label>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="form.activo"> Activo
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="showModal = false">Cancelar</button>
      <button class="btn btn-primary" (click)="guardar()">Guardar</button>
    </div>
  </div>
</div>

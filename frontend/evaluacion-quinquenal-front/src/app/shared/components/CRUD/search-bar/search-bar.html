<!-- Encabezado -->
    <div class="crud-header">
        <div>
            <h2>Gestión de {{ titulo }}</h2>
            <p>Administrador de {{ titulo }} en el sistema</p>
        </div>

        <button *ngIf="showCreate" class="btn-primary" (click)="onCreate()">
            + Nuevo Registro
        </button>
    </div>
    
    <!-- Herramientas -->
    <div class="toolbar">

        <input
            type="text"
            [placeholder]="placeholder"
            class="search-box"
            [value]="value"
            (input)="onSearch($event)"
        >

        <select *ngIf="showState && stateOptions?.length" [attr.aria-label]="stateLabel" (change)="onStateChange($event)">
            <option *ngFor="let option of stateOptions" [value]="option">{{ option }}</option>
        </select>

        <select>
            <option>10 registros</option>
            <option>25 registros</option>
            <option>50 registros</option>
        </select>

    </div>

<header class="barra-navegacion" [class.close]="!sidebarOpen">

  <div class="izquierda">

    <img
      src="img/UASD-Logo.png"
      alt="Logo UASD"
      class="logo-uasd">

    <div class="info-sistema">

      <span class="titulo">
        Sistema de Gestión de Evidencias
      </span>

      <span class="subtitulo">
        Evaluación Quinquenal UASD - MESCyT
      </span>

    </div>

  </div>

  <div class="derecha" *ngIf="!isLoggedIn">

    <a routerLink="auth/login" class="btn-login">
      Iniciar Sesión
    </a>

    <a routerLink="auth/register" class="btn-register">
      Registrarse
    </a>

  </div>

  <div class="derecha" *ngIf="isLoggedIn">

    <span class="user-info">
      <i class='bx bx-user-circle'></i>
      {{ user?.first_name }} {{ user?.last_name }}
      <span class="user-rol">({{ user?.rol }})</span>
    </span>

    <a class="btn-logout" (click)="logout()">
      <i class='bx bx-log-out'></i> Cerrar sesión
    </a>

  </div>

</header>
